name: "Toggle a Pixel"
description: "Toggle a pixel on the board by entering its coordinates"
title: "[pixel] toggle"
labels: ["pixel"]
body:
  - type: markdown
    attributes:
      value: |
        Enter the coordinates of the pixel you want to toggle.
  - type: input
    id: x
    attributes:
      label: "X (0–31)"
      description: "Column number, left to right"
      placeholder: "e.g. 15"
    validations:
      required: true
  - type: input
    id: y
    attributes:
      label: "Y (0–15)"
      description: "Row number, top to bottom"
      placeholder: "e.g. 8"
    validations:
      required: true
