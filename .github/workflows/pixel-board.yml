name: Pixel Board

on:
  issues:
    types: [opened]

jobs:
  toggle-pixel:
    if: contains(github.event.issue.labels.*.name, 'pixel')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Toggle pixel
        id: pixel
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: python pixel/render.py
        continue-on-error: true

      - name: Commit
        if: steps.pixel.outputs.status == 'ok'
        run: |
          git config user.name "pixel-bot"
          git config user.email "pixel-bot@users.noreply.github.com"
          git add pixel/ README.md
          git commit -m "pixel(${{ github.event.issue.user.login }}): #${{ github.event.issue.number }}"
          git push

      - name: Comment & close issue
        if: always()
        uses: actions/github-script@v7
        env:
          PIXEL_STATUS: ${{ steps.pixel.outputs.status }}
          PIXEL_MSG: ${{ steps.pixel.outputs.message }}
        with:
          script: |
            const status = process.env.PIXEL_STATUS || 'error';
            const msg = process.env.PIXEL_MSG || 'Something went wrong processing this pixel.';
            const emoji = status === 'ok' ? ':art:' : ':x:';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} ${msg}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
